name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: dbname
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'pnpm'
    - name: Install dependencies
      run: pnpm install
    - name: Web Prisma schema in sync with root
      run: diff -q prisma/schema.prisma web/prisma/schema.prisma
    - name: Generate Prisma Client
      run: pnpm prisma generate
    - name: Unit tests
      run: pnpm test:unit
    - name: Create Database Schema
      env:
        DATABASE_URL: "postgresql://user:password@localhost:5432/dbname"
      run: npx prisma db push
    - name: Run Playwright API tests
      env:
        DATABASE_URL: "postgresql://user:password@localhost:5432/dbname"
        GEMINI_API_KEY: "dummy_gemini_key"
        OPENAI_API_KEY: "dummy_openai_key"
        SARVAM_API_KEY: "dummy_sarvam_key"
        TELEGRAM_BOT_TOKEN: "dummy_bot_token"
        TELEGRAM_WEBHOOK_SECRET: "dummy_webhook_secret"
      run: pnpm exec playwright test
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
