name: Railway post-deploy check

on:
  deployment_status:

jobs:
  health-check:
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check API health
        run: |
          curl --fail --retry 3 --retry-delay 5 \
            "${{ secrets.RAILWAY_API_URL }}/health"
